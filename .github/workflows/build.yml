name: Build deepin 25 Dock Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: linuxdeepin/deepin:25

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake qt6-base-dev \
            libdtk6core-dev libdtk6gui-dev libdtk6widget-dev \
            dde-tray-loader-dev
          rm -rf /var/lib/apt/lists/*

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -B build -DOPT_ENABLE_QT6=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libnetspeed-monitor.so
          path: build/libnetspeed-monitor.so
