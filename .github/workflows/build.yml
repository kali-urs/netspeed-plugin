name: Build deepin 25 Dock Plugin

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: linuxdeepin/deepin:25

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake qt6-base-dev \
            libdtk6core-dev libdtk6gui-dev libdtk6widget-dev \
            dde-tray-loader-dev pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -B build -DOPT_ENABLE_QT6=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libnetspeed-monitor.so
          path: build/libnetspeed-monitor.so

      - name: Create release package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp build/libnetspeed-monitor.so release/
          cp netspeed.json release/
          echo "安装方法：
          sudo cp libnetspeed-monitor.so /usr/lib/dde-dock/plugins/
          sudo chmod 644 /usr/lib/dde-dock/plugins/libnetspeed-monitor.so
          killall dde-shell" > release/install.txt
          cd release && tar czf ../netspeed-plugin-${{ github.ref_name }}.tar.gz *

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: netspeed-plugin-*.tar.gz
          generate_release_notes: true
